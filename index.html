<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <div class="container">
        <div class="calculator-wrapper">
            <!-- Header -->
            <div class="calculator-header">
                <h1>Scientific Calculator</h1>
                <p class="subtitle">Professional Edition</p>
            </div>

            <!-- Display Section -->
            <div class="display-section">
                <div class="expression-history" id="expressionHistory"></div>
                <input type="text" id="display" class="display" placeholder="0" readonly>
            </div>

            <!-- Button Section -->
            <div class="calculator-body">
                <!-- Row 1: Function buttons (sin, cos, tan, etc.) -->
                <div class="button-row science-row">
                    <button class="btn sci-btn" onclick="appendFunction('sin')"><span
                            class="btn-label">sin</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('cos')"><span
                            class="btn-label">cos</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('tan')"><span
                            class="btn-label">tan</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('log')"><span
                            class="btn-label">log</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('ln')"><span
                            class="btn-label">ln</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('sqrt')"><span
                            class="btn-label">√</span></button>
                </div>

                <!-- Row 2: More functions -->
                <div class="button-row science-row">
                    <button class="btn sci-btn" onclick="appendFunction('asin')"><span
                            class="btn-label">asin</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('acos')"><span
                            class="btn-label">acos</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('atan')"><span
                            class="btn-label">atan</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('exp')"><span
                            class="btn-label">e^x</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('factorial')"><span
                            class="btn-label">x!</span></button>
                    <button class="btn operator-btn" onclick="appendOperator('^')"><span
                            class="btn-label">x^y</span></button>
                </div>

                <!-- Row 3: Constants and more -->
                <div class="button-row science-row">
                    <button class="btn sci-btn" onclick="insertConstant('pi')"><span class="btn-label">π</span></button>
                    <button class="btn sci-btn" onclick="insertConstant('e')"><span class="btn-label">e</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('abs')"><span
                            class="btn-label">|x|</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('log2')"><span
                            class="btn-label">log₂</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('floor')"><span
                            class="btn-label">⌊x⌋</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('ceil')"><span
                            class="btn-label">⌈x⌉</span></button>
                </div>

                <!-- Row 4: Main calculator buttons -->
                <div class="button-row">
                    <button class="btn function-btn" onclick="clearDisplay()"><span class="btn-label">C</span></button>
                    <button class="btn function-btn" onclick="deleteLast()"><span class="btn-label">DEL</span></button>
                    <button class="btn function-btn" onclick="toggleSign()"><span class="btn-label">±</span></button>
                    <button class="btn operator-btn" onclick="appendParenthesis('(')"><span
                            class="btn-label">(</span></button>
                    <button class="btn operator-btn" onclick="appendParenthesis(')')"><span
                            class="btn-label">)</span></button>
                </div>

                <!-- Row 4.5: Division, mod, and hyperbolic functions -->
                <div class="button-row">
                    <button class="btn operator-btn" onclick="appendOperator('/')"><span
                            class="btn-label">÷</span></button>
                    <button class="btn operator-btn" onclick="appendOperator('%')"><span
                            class="btn-label">mod</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('sinh')"><span
                            class="btn-label">sinh</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('cosh')"><span
                            class="btn-label">cosh</span></button>
                    <button class="btn sci-btn" onclick="appendFunction('tanh')"><span
                            class="btn-label">tanh</span></button>
                </div>

                <!-- Row 5: Numbers 7-9 and multiply -->
                <div class="button-row">
                    <button class="btn number-btn" onclick="appendNumber('7')"><span class="btn-label">7</span></button>
                    <button class="btn number-btn" onclick="appendNumber('8')"><span class="btn-label">8</span></button>
                    <button class="btn number-btn" onclick="appendNumber('9')"><span class="btn-label">9</span></button>
                    <button class="btn operator-btn" onclick="appendOperator('*')"><span
                            class="btn-label">×</span></button>
                </div>

                <!-- Row 6: Numbers 4-6 and minus -->
                <div class="button-row">
                    <button class="btn number-btn" onclick="appendNumber('4')"><span class="btn-label">4</span></button>
                    <button class="btn number-btn" onclick="appendNumber('5')"><span class="btn-label">5</span></button>
                    <button class="btn number-btn" onclick="appendNumber('6')"><span class="btn-label">6</span></button>
                    <button class="btn operator-btn" onclick="appendOperator('-')"><span
                            class="btn-label">−</span></button>
                </div>

                <!-- Row 7: Numbers 1-3 and plus -->
                <div class="button-row">
                    <button class="btn number-btn" onclick="appendNumber('1')"><span class="btn-label">1</span></button>
                    <button class="btn number-btn" onclick="appendNumber('2')"><span class="btn-label">2</span></button>
                    <button class="btn number-btn" onclick="appendNumber('3')"><span class="btn-label">3</span></button>
                    <button class="btn operator-btn" onclick="appendOperator('+')"><span
                            class="btn-label">+</span></button>
                </div>

                <!-- Row 8: Zero, decimal, and equals -->
                <div class="button-row">
                    <button class="btn number-btn wide" onclick="appendNumber('0')"><span
                            class="btn-label">0</span></button>
                    <button class="btn number-btn" onclick="appendNumber('.')"><span class="btn-label">.</span></button>
                    <button class="btn equals-btn" onclick="calculate()"><span class="btn-label">=</span></button>
                </div>
            </div>

            <!-- History Section -->
            <div class="history-section">
                <div class="history-header">
                    <h3>History</h3>
                    <button class="clear-history-btn" onclick="clearHistory()">Clear</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
    </div>

    <script src="static/script.js"></script>
</body>

</html>
